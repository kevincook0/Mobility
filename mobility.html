<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mobility</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="leopard.png" />
  <meta name="theme-color" content="#0f0f11" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mobility" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f7f7f5;
      --text: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-tertiary: #a0a0a0;
      --border: rgba(0,0,0,0.1);
      --border-light: rgba(0,0,0,0.06);
      --radius: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #191919;
        --bg-secondary: #232323;
        --text: #f0f0f0;
        --text-secondary: #9a9a9a;
        --text-tertiary: #5a5a5a;
        --border: rgba(255,255,255,0.1);
        --border-light: rgba(255,255,255,0.06);
      }
    }

    html { background: var(--bg); }

    body {
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    #app {
      max-width: 600px;
      margin: 0 auto;
      padding: 52px 20px 80px;
    }

    .page-icon { font-size: 44px; margin-bottom: 12px; line-height: 1; }
    .page-title { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 28px; color: var(--text); }

    .sport-row {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 12px;
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
      min-height: 64px;
      text-decoration: none;
      color: inherit;
    }
    .sport-row:hover { background: var(--bg-secondary); }
    .sport-row:active { background: var(--bg-secondary); opacity: 0.8; }
    .sport-row-icon { font-size: 22px; width: 28px; text-align: center; flex-shrink: 0; }
    .sport-row-label { font-size: 17px; font-weight: 500; flex: 1; color: var(--text); }
    .sport-row-meta { font-size: 13px; color: var(--text-tertiary); white-space: nowrap; }
    .row-divider { height: 0.5px; background: var(--border-light); margin: 0 12px; }

    .chevron {
      width: 16px; height: 16px;
      stroke: var(--text-tertiary); fill: none;
      stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 15px; color: var(--text-secondary);
      cursor: pointer; min-height: 44px;
      padding: 8px 0; margin-bottom: 20px;
      user-select: none; transition: color 0.1s;
    }
    .back-link:hover { color: var(--text); }
    .back-link svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    .tabs-wrapper {
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .tab-labels {
      display: flex;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg-secondary);
    }

    .tab-label {
      flex: 1;
      padding: 14px 8px;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-tertiary);
      text-align: center;
      cursor: pointer;
      border-right: 0.5px solid var(--border);
      background: var(--bg-secondary);
      user-select: none;
      transition: color 0.1s, background 0.1s;
      min-height: 48px;
      display: flex; align-items: center; justify-content: center;
    }
    .tab-label:last-child { border-right: none; }
    .tab-label:active { opacity: 0.7; }
    .tab-label.active {
      background: var(--bg);
      color: var(--text);
      font-weight: 500;
      border-bottom: 0.5px solid var(--bg);
      margin-bottom: -0.5px;
      z-index: 1;
      position: relative;
    }

    .tab-content { padding: 20px 16px 24px; }

    .ex-row {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 12px 8px;
      font-size: 15px; line-height: 1.4;
      min-height: 48px;
    }
    .ex-row + .ex-row { border-top: 0.5px solid var(--border-light); }
    .ex-num { color: var(--text-tertiary); min-width: 20px; flex-shrink: 0; font-size: 13px; font-variant-numeric: tabular-nums; padding-top: 2px; }
    .ex-body { flex: 1; min-width: 0; }
    .ex-name { color: var(--text); font-size: 15px; }
    .ex-detail { font-size: 13px; color: var(--text-tertiary); margin-top: 3px; }

    .ex-log {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      color: var(--text-secondary);
      font-family: inherit;
      cursor: pointer;
      min-height: 36px;
      flex-shrink: 0;
      align-self: center;
      white-space: nowrap;
      transition: background 0.1s, color 0.1s;
    }
    .ex-log:active { opacity: 0.7; }
    .ex-log.has-log { color: var(--text); background: var(--bg); }

    #log-modal {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.5);
    }
    @media (prefers-color-scheme: dark) {
      .modal-backdrop { background: rgba(0,0,0,0.7); }
    }
    .modal-dialog {
      position: relative;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      width: 100%; max-width: 360px;
      max-height: calc(100dvh - 40px);
      overflow-y: auto;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .modal-title { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .modal-subtitle { font-size: 13px; color: var(--text-tertiary); margin-bottom: 16px; }
    .modal-set-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
    }
    .modal-set-row + .modal-set-row { border-top: 0.5px solid var(--border-light); }
    .modal-set-label { font-size: 13px; color: var(--text-secondary); width: 46px; flex-shrink: 0; }
    .modal-set-input {
      flex: 1; min-width: 0; width: 100%;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      -webkit-appearance: none;
      appearance: none;
      min-height: 44px;
      font-variant-numeric: tabular-nums;
    }
    .modal-set-input::placeholder { color: var(--text-tertiary); }
    .modal-set-input:focus { outline: none; border-color: var(--text-secondary); }
    .modal-actions {
      display: flex; gap: 10px; margin-top: 20px;
    }
    .modal-btn {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 0.5px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      min-height: 44px;
    }
    .modal-btn:active { opacity: 0.7; }
    .modal-save { background: var(--text); color: var(--bg); border-color: var(--text); }

    .aff-row {
      display: flex; gap: 14px;
      padding: 12px 8px;
      font-size: 15px; line-height: 1.55;
      min-height: 48px;
    }
    .aff-row + .aff-row { border-top: 0.5px solid var(--border-light); }
    .aff-num { color: var(--text-tertiary); min-width: 20px; flex-shrink: 0; font-size: 13px; padding-top: 2px; }
    .aff-text { color: var(--text); }

    .hidden { display: none !important; }
  </style>
</head>

    let currentSport = null;
    let currentTab = null;
    let currentLogId = null;
    let currentLogSets = 0;

    const LOG_KEY = 'mobility.strength.log.v1';

    function loadLog() {
      try { return JSON.parse(localStorage.getItem(LOG_KEY) || '{}'); }
      catch (e) { return {}; }
    }
    function saveLog(log) {
      try { localStorage.setItem(LOG_KEY, JSON.stringify(log)); }
      catch (e) {}
    }

    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function formatLog(id, sets) {
      const entries = (loadLog()[id] || []);
      const parts = [];
      let any = false;
      for (let i = 0; i < sets; i++) {
        const e = entries[i];
        if (e && (e.weight != null || e.reps != null)) {
          any = true;
          const w = e.weight != null ? e.weight : '—';
          const r = e.reps != null ? e.reps : '—';
          parts.push(`${w}×${r}`);
        } else {
          parts.push('—');
        }
      }
      return { text: parts.join(' · '), any };
    }

    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }

    function goHome() {
      hide('sport-view');
      show('home-view');
    }

      currentSport = sport;

      const d = data[sport];
      document.getElementById('sport-icon').textContent = d.icon;
      document.getElementById('sport-title').textContent = d.label;
      renderTabs();
      renderContent();
      hide('home-view');
      show('sport-view');
    }

    function renderTabs() {
      const d = data[currentSport];
      const labels = document.getElementById('tab-labels');
      labels.innerHTML = '';
      d.tabs.forEach(tab => {
        const el = document.createElement('div');
        el.className = 'tab-label' + (tab === currentTab ? ' active' : '');
        el.textContent = d.tabLabels[tab];
        el.onclick = () => { currentTab = tab; renderTabs(); renderContent(); };
        labels.appendChild(el);
      });
    }

    function renderContent() {
      const content = document.getElementById('tab-content');
      const d = data[currentSport];
      content.innerHTML = '';

      if (currentTab === 'affirmations') {
        d.affirmations.forEach((text, i) => {
          const row = document.createElement('div');
          row.className = 'aff-row';
          row.innerHTML = `<div class="aff-num">${i + 1}</div><div class="aff-text">${text}</div>`;
          content.appendChild(row);
        });
      } else {
        d[currentTab].forEach((ex, i) => {
          const row = document.createElement('div');
          row.className = 'ex-row';
          let logBtn = '';
          if (ex.id && ex.sets) {
            const { text, any } = formatLog(ex.id, ex.sets);
            logBtn = `<button class="ex-log${any ? ' has-log' : ''}" data-id="${esc(ex.id)}" data-name="${esc(ex.name)}" data-detail="${esc(ex.detail)}" data-sets="${ex.sets}" onclick="openLogModal(this)">${esc(text)}</button>`;
          }
          row.innerHTML = `<div class="ex-num">${i + 1}</div><div class="ex-body"><div class="ex-name">${ex.name}</div><div class="ex-detail">${ex.detail}</div></div>${logBtn}`;
          content.appendChild(row);
        });
      }
    }

    function openLogModal(btn) {
      const id = btn.dataset.id;
      const name = btn.dataset.name;
      const detail = btn.dataset.detail;
      const sets = parseInt(btn.dataset.sets, 10);
      currentLogId = id;
      currentLogSets = sets;
      const entries = loadLog()[id] || [];
      document.getElementById('modal-title').textContent = name;
      document.getElementById('modal-subtitle').textContent = detail;
      const container = document.getElementById('modal-sets');
      container.innerHTML = '';
      for (let i = 0; i < sets; i++) {
        const e = entries[i] || {};
        const row = document.createElement('div');
        row.className = 'modal-set-row';
        row.innerHTML = `
          <div class="modal-set-label">Set ${i + 1}</div>
          <input class="modal-set-input" type="number" inputmode="decimal" placeholder="weight" data-field="weight" data-set="${i}" value="${e.weight != null ? e.weight : ''}">
          <input class="modal-set-input" type="number" inputmode="decimal" placeholder="reps" data-field="reps" data-set="${i}" value="${e.reps != null ? e.reps : ''}">
        `;
        container.appendChild(row);
      }
      show('log-modal');
      // focus first weight input for quick entry
      const first = container.querySelector('.modal-set-input');
      if (first) setTimeout(() => first.focus(), 50);
    }

    function closeLogModal() {
      hide('log-modal');
      currentLogId = null;
      currentLogSets = 0;
    }

    function saveLogModal() {
      if (!currentLogId) return;
      const entries = [];
      for (let i = 0; i < currentLogSets; i++) {
        const wEl = document.querySelector(`.modal-set-input[data-field="weight"][data-set="${i}"]`);
        const rEl = document.querySelector(`.modal-set-input[data-field="reps"][data-set="${i}"]`);
        const w = wEl && wEl.value !== '' ? Number(wEl.value) : null;
        const r = rEl && rEl.value !== '' ? Number(rEl.value) : null;
        entries.push({ weight: w, reps: r });
      }
      const log = loadLog();
      const allEmpty = entries.every(e => e.weight == null && e.reps == null);
      if (allEmpty) delete log[currentLogId];
      else log[currentLogId] = entries;
      saveLog(log);
      closeLogModal();
      renderContent();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !document.getElementById('log-modal').classList.contains('hidden')) {
        closeLogModal();
      }
    });
  </script>
</body>
</html>
